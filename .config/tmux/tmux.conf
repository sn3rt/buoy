# tmux config (XDG)

# Better UX defaults
set -g mouse on
set -g history-limit 50000
setw -g mode-keys vi
set -sg escape-time 10

# Free Alt+c for the OpenCode popup (handled by opencode tmux server)
unbind-key -n M-c

# Floating "popup" for OpenCode (tmux >= 3.2)
# Alt+o shows OpenCode in a popup.
# Implementation detail: OpenCode runs inside a separate tmux server (-L opencode)
# so it keeps running when the popup closes.
bind-key -n M-o run-shell 'bash "${XDG_CONFIG_HOME:-$HOME/.config}/tmux/popup-dispatch.sh" opencode "#{pane_id}" "#{q:session_id}" "#{q:session_path}" "#{q:client_tty}"'

# Floating "popup" for Codex
# Alt+p shows Codex in a popup.
bind-key -n M-p run-shell 'bash "${XDG_CONFIG_HOME:-$HOME/.config}/tmux/popup-dispatch.sh" codex "#{pane_id}" "#{q:session_id}" "#{q:session_path}" "#{q:client_tty}"'

# Floating "popup" for Claude
# Alt+b shows Claude in a popup.
bind-key -n M-b run-shell 'bash "${XDG_CONFIG_HOME:-$HOME/.config}/tmux/popup-dispatch.sh" claude "#{pane_id}" "#{q:session_id}" "#{q:session_path}" "#{q:client_tty}"'

# Floating "popup" for Yazi
# Alt+e shows Yazi in a popup (same hide behavior via Alt+c inside popup).
bind-key -n M-e run-shell 'bash "${XDG_CONFIG_HOME:-$HOME/.config}/tmux/popup-dispatch.sh" yazi "#{pane_id}" "#{q:session_id}" "#{q:session_path}" "#{q:client_tty}"'

# Floating "popup" for FZF file search
# Alt+f shows a file picker; Enter opens in $EDITOR in the original pane.
bind-key -n M-f run-shell 'bash "${XDG_CONFIG_HOME:-$HOME/.config}/tmux/popup-dispatch.sh" fzf "#{pane_id}" "#{q:session_id}" "#{q:session_path}" "#{q:client_tty}"'
