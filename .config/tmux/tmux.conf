# tmux config (XDG)

# Better UX defaults
set -g mouse on
set -g history-limit 50000
setw -g mode-keys vi
set -sg escape-time 10

# Free Alt+c for the OpenCode popup (handled by opencode tmux server)
unbind-key -n M-c

# Floating "popup" for OpenCode (tmux >= 3.2)
# Alt+o shows OpenCode in a popup.
# Implementation detail: OpenCode runs inside a separate tmux server (-L opencode)
# so it keeps running when the popup closes.
bind-key -n M-o display-popup -E -T "OpenCode" -w 90% -h 90% -d "#{session_path}" \
  "bash \"$HOME/.config/tmux/popup-server.sh\" opencode \"$HOME/.config/tmux/opencode.conf\" opencode \"$(tmux display-message -p '#{session_path}')\" opencode"

# Floating "popup" for Yazi
# Alt+e shows Yazi in a popup (same hide behavior via Alt+c inside popup).
bind-key -n M-e display-popup -E -T "Yazi" -w 90% -h 90% -d "#{session_path}" \
  "bash \"$HOME/.config/tmux/popup-server.sh\" yazi \"$HOME/.config/tmux/yazi.conf\" yazi \"$(tmux display-message -p '#{session_path}')\" yazi"

# Floating "popup" for FZF file search
# Alt+f shows a file picker; Enter opens in $EDITOR in the original pane.
bind-key -n M-f set -F @fzf_popup_target "#{pane_id}" \; display-popup -E -T "FZF" -w 90% -h 90% -d "#{session_path}" \
  "bash \"$HOME/.config/tmux/fzf-popup.sh\""
