# tmux config (XDG)

# Better UX defaults
set -g mouse on
set -g set-clipboard on
set -g history-limit 50000
setw -g mode-keys vi
set -sg escape-time 10
set -g allow-passthrough on
set -as terminal-features ',xterm-kitty:clipboard'
set -g extended-keys on
set -ga update-environment PATH
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -ga update-environment SSH_CONNECTION
set -ga update-environment SSH_TTY

# Starship-inspired theme
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=black,fg=cyan"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=black,bg=cyan,bold] #S #[fg=cyan,bg=brightblack,nobold]"
set -g status-right "#[fg=brightblack,bg=black]#[fg=cyan,bg=brightblack] %H:%M #[fg=black,bg=cyan]#[fg=black,bg=cyan,bold] %d %b "
set -g window-status-format "#[fg=cyan,bg=black] #I:#W "
set -g window-status-current-format "#[fg=brightblack,bg=black]#[fg=black,bg=cyan,bold] #I:#W #[fg=cyan,bg=black,nobold]"
set -g window-status-separator ""
set -g message-style "bg=cyan,fg=black,bold"
set -g mode-style "bg=cyan,fg=black,bold"
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=cyan"

# Remove retired directional bindings when re-sourcing an existing server.
unbind-key -n M-i
unbind-key -n M-I
unbind-key -n C-M-j

# Vim-style pane/window controls.
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R

bind-key -n M-H swap-pane -t '{left-of}'
bind-key -n M-J swap-pane -t '{down-of}'
bind-key -n M-K swap-pane -t '{up-of}'
bind-key -n M-L swap-pane -t '{right-of}'

bind-key -n M-q split-window -h -c "#{pane_current_path}"
bind-key -n M-Q split-window -v -c "#{pane_current_path}"
bind-key -n M-t if-shell -F '#{==:#{pane_width},#{window_width}}' 'select-layout even-horizontal' 'select-layout even-vertical'
bind-key -n M-x confirm-before -p "kill pane #P? (y/n)" kill-pane

bind-key -n M-u previous-window
bind-key -n M-o next-window
bind-key -n C-M-h if-shell 'tmux join-pane -s "#{pane_id}" -t ":-1" 2>/dev/null' '' 'display-message "no previous window"'
bind-key -n C-M-l if-shell 'tmux join-pane -s "#{pane_id}" -t ":+1" 2>/dev/null' '' 'display-message "no next window"'

# Close the active tmux popup from the outer tmux server.
bind-key -n M-c display-popup -C

# Floating "popup" for Codex
# Alt+p shows Codex in a popup.
bind-key -n M-p run-shell 'bash "${XDG_CONFIG_HOME:-$HOME/.config}/tmux/popup-dispatch.sh" codex "#{pane_id}" "#{q:session_id}" "#{q:session_name}" "#{q:socket_path}" "#{q:session_path}" "#{q:client_tty}"'

# Floating "popup" for Claude
# Alt+b shows Claude in a popup.
bind-key -n M-b run-shell 'bash "${XDG_CONFIG_HOME:-$HOME/.config}/tmux/popup-dispatch.sh" claude "#{pane_id}" "#{q:session_id}" "#{q:session_name}" "#{q:socket_path}" "#{q:session_path}" "#{q:client_tty}"'

# Floating "popup" for Yazi
# Alt+e shows Yazi in a popup.
bind-key -n M-e run-shell 'bash "${XDG_CONFIG_HOME:-$HOME/.config}/tmux/popup-dispatch.sh" yazi "#{pane_id}" "#{q:session_id}" "#{q:session_name}" "#{q:socket_path}" "#{q:session_path}" "#{q:client_tty}"'
run-shell -b 'bash "$HOME/.config/tmux/yazi-server.sh" warm "#{q:session_id}" "#{q:session_name}" "#{q:socket_path}" "#{q:session_path}" || true'
set-hook -g client-attached 'run-shell -b "bash \"$HOME/.config/tmux/yazi-server.sh\" warm \"#{q:session_id}\" \"#{q:session_name}\" \"#{q:socket_path}\" \"#{q:session_path}\" || true"'
set-hook -g client-session-changed 'run-shell -b "bash \"$HOME/.config/tmux/yazi-server.sh\" warm \"#{q:session_id}\" \"#{q:session_name}\" \"#{q:socket_path}\" \"#{q:session_path}\" || true"'

# Floating "popup" for FZF file search
# Alt+f shows a file picker; Enter opens in $EDITOR in the original pane.
bind-key -n M-f run-shell 'bash "${XDG_CONFIG_HOME:-$HOME/.config}/tmux/popup-dispatch.sh" fzf "#{pane_id}" "#{q:session_id}" "#{q:session_name}" "#{q:socket_path}" "#{q:session_path}" "#{q:client_tty}"'
