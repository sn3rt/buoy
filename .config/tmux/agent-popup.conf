# Shared config for long-lived agent popup tmux servers.

set -g status off
set -g mouse on
setw -g mode-keys vi
set -sg escape-time 10
set -g set-clipboard on
set -g copy-command 'wl-copy'

bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'wl-copy'
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'wl-copy'
bind-key -n M-y copy-mode

# Hide the popup by detaching the client (outer popup auto-closes via -E).
bind-key -n M-c detach-client
