# Shared config for long-lived agent popup tmux servers.

set -g status off
set -g mouse on
setw -g mode-keys vi
set -sg escape-time 10
set -g set-clipboard on
set -g copy-command 'bash "${BUOY_TMUX_CONFIG_DIR:-${XDG_CONFIG_HOME:-$HOME/.config}/tmux}/copy.sh"'

# Claude enables application mouse tracking, which makes tmux pass drags to
# Claude instead of starting copy mode. Keep clicks available to the TUI, but
# always let tmux own drag selections so MouseDragEnd1Pane copies outward.
bind-key -T root MouseDrag1Pane copy-mode -M
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'bash "${BUOY_TMUX_CONFIG_DIR:-${XDG_CONFIG_HOME:-$HOME/.config}/tmux}/copy.sh"'
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'bash "${BUOY_TMUX_CONFIG_DIR:-${XDG_CONFIG_HOME:-$HOME/.config}/tmux}/copy.sh"'
bind-key -n M-y copy-mode

# Hide the popup by detaching the client (outer popup auto-closes via -E).
bind-key -n M-c detach-client
