# Minimal config for the Yazi popup tmux server.

set -g status off
set -g mouse on
set -sg escape-time 10
set -g destroy-unattached on

# Yazi is short-lived. Detach the popup client; destroy-unattached then cleans
# up the disposable yazi server without leaving a stuck floating window.
bind-key -n M-c detach-client
