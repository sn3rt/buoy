# Console-safe Starship theme for the Linux virtual terminal.
# Keep this ASCII-only: the kernel console font usually lacks Nerd Font glyphs.
add_newline = false

format = "$username $directory$git_branch$git_status $character"

[username]
style_user = "bright-cyan"
style_root = "red bold"
format = "[$user]($style)"
show_always = true

[directory]
style = "white bold"
format = "[$path]($style)"
truncation_length = 3

[git_branch]
style = "cyan"
format = " [git:$branch]($style)"

[git_status]
style = "yellow"
format = "[$all_status$ahead_behind]($style)"
conflicted = "="
ahead = ">"
behind = "<"
diverged = "<>"
up_to_date = ""
untracked = "u"
stashed = "$"
modified = "!"
staged = "+"
renamed = "r"
deleted = "x"
typechanged = "t"

[character]
success_symbol = "[>](green)"
error_symbol = "[>](red)"
vicmd_symbol = "[<](blue)"
