[preview]
max_width = 10000
max_height = 10000
image_quality = 60
image_delay = 100

[opener]
imv = [
  { run = "imv %s", orphan = true, desc = "Open in imv", for = "unix" }
]

[open]
prepend_rules = [
  { mime = "image/*", use = "imv" }
]

[mgr]
linemode = "btime_and_size"

[plugin]
# TIFF via ImageMagick (werkt ook voor .tif/.tiff die de builtin decoder niet pakt)
prepend_previewers = [
  { mime = "image/tiff", run = "magick" },
  { url = "*.tif",  run = "magick" },
  { url = "*.tiff", run = "magick" }
]

prepend_preloaders = [
  { mime = "image/tiff", run = "magick" },
  { url = "*.tif",  run = "magick" },
  { url = "*.tiff", run = "magick" }
]

